<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="refresh" content="0; url=/cbhn-playground/" />
    <script>
      // For client-side routing: redirect to index.html with correct path for React Router
      var l = window.location;
      var base = '/cbhn-playground';
      var path = l.pathname.replace(base, '');
      var search = l.search || '';
      var hash = l.hash || '';
      var newUrl = base + '/index.html?redirect=' + encodeURIComponent(path + search + hash);
      window.location.replace(newUrl);
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
