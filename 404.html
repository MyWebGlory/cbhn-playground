<!DOCTYPE html>
<html>
  <head>
    <script>
      // GitHub Pages SPA fix: preserve the original path and pass it to React Router via ?redirect
      var base = '/cbhn-playground';
      var path = window.location.pathname.replace(base, '') || '/';
      var search = window.location.search || '';
      var hash = window.location.hash || '';
      window.location.replace(base + '/?redirect=' + encodeURIComponent(path + search + hash));
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
