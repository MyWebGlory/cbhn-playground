<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBHN Conference - Zoom Landing Page</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/styles/main.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'shamrock': '#36c98a',
                        'molten-orange': '#ff5a1f',
                        'gold': '#ffd600',
                        'sky': '#00c3f3',
                        'deep-blue': '#003687',
                        'magenta-bloom': '#fc0367',
                        'cream': '#f9f6f2',
                        'charcoal': '#23272a',
                    },
                    fontFamily: {
                        'sans': ['Open Sans', 'sans-serif'],
                        'display': ['Playfair Display', 'serif'],
                    },
                }
            }
        }
    </script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
        }
        
        .zoom-graphic {
            width: 1920px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            background: #003687;
        }
        
        @media screen and (max-width: 1920px) {
            .zoom-graphic {
                transform-origin: top left;
                transform: scale(calc(100vw / 1920));
            }
            body {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body class="font-sans">
    
    <!-- Zoom Landing Page Graphic - 1920x1080 -->
    <div class="zoom-graphic">
        
        <!-- Background Image -->
        <img src="/images/cbhn-image-background.png" alt="Black community members" class="absolute inset-0 w-full h-full object-cover object-center">
        
        <!-- Dark Gradient Overlay -->
        <div class="absolute inset-0" style="background: linear-gradient(135deg, rgba(0,54,135,0.85) 0%, rgba(0,54,135,0.6) 40%, rgba(0,0,0,0.4) 100%);"></div>
        
        <!-- Decorative Elements -->
        <div class="absolute top-0 right-0 w-[800px] h-[800px] rounded-full -translate-y-1/3 translate-x-1/4" style="background: radial-gradient(circle, rgba(255,90,31,0.15) 0%, transparent 70%);"></div>
        <div class="absolute bottom-0 left-0 w-[600px] h-[600px] rounded-full translate-y-1/2 -translate-x-1/4" style="background: radial-gradient(circle, rgba(54,201,138,0.12) 0%, transparent 70%);"></div>
        
        <!-- Subtle Frame Border -->
        <div class="absolute inset-8 border border-white/15 rounded-3xl pointer-events-none"></div>
        
        <!-- Corner Accents -->
        <div class="absolute top-16 left-16 w-24 h-24 border-l-4 border-t-4 border-molten-orange/60 rounded-tl-3xl"></div>
        <div class="absolute bottom-16 right-16 w-24 h-24 border-r-4 border-b-4 border-shamrock/60 rounded-br-3xl"></div>
        
        <!-- Floating Decorative Shapes -->
        <div class="absolute top-32 right-32 w-20 h-20 rounded-full border border-white/20"></div>
        <div class="absolute top-48 right-48 w-6 h-6 bg-gold/70 rounded-full"></div>
        <div class="absolute bottom-40 left-40 w-16 h-16 border border-shamrock/30 rounded-2xl rotate-12"></div>
        
        <!-- Main Content -->
        <div class="relative z-10 h-full flex items-center px-24">
            
            <div class="flex-1">
                
                <!-- CBHN Logo -->
                <div class="mb-12">
                    <div class="inline-block bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-white/20">
                        <img src="/images/cbhn-white.png" alt="CBHN Logo" class="h-28 w-auto">
                    </div>
                </div>
                
                <!-- Main Title -->
                <div class="relative mb-8">
                    <h1 class="font-display text-[180px] font-bold text-white leading-none tracking-tight drop-shadow-2xl">
                        Hidden Crises
                    </h1>
                    <div class="absolute -bottom-3 left-0 w-96 h-3 bg-gradient-to-r from-molten-orange via-gold to-transparent rounded-full"></div>
                </div>
                
                <!-- Subtitle -->
                <div class="relative pl-12 mb-14">
                    <div class="absolute left-0 top-0 bottom-0 w-2 bg-gradient-to-b from-molten-orange via-molten-orange/60 to-transparent rounded-full"></div>
                    <h2 class="text-7xl text-white/90 font-light leading-tight">
                        Stress, Mental Health &amp; Brain Health
                    </h2>
                    <p class="text-8xl text-gold font-display font-bold mt-4">
                        in the Black Community
                    </p>
                </div>
                
            </div>
            
        </div>
        
        <!-- Bottom Accent Line -->
        <div class="absolute bottom-0 left-0 right-0 h-2 bg-gradient-to-r from-shamrock via-molten-orange to-gold"></div>
        
        <!-- Organization Name Footer -->
        <div class="absolute bottom-8 right-12 flex items-center gap-3">
            <div class="w-2 h-2 bg-molten-orange rounded-full"></div>
            <p class="text-white/70 text-3xl font-semibold tracking-widest uppercase">California Black Health Network</p>
            <div class="w-2 h-2 bg-molten-orange rounded-full"></div>
        </div>
        
    </div>
    
</body>
</html>
